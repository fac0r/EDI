spring.application.name=EdiPsico

spring.datasource.url=${APP_DATABASE_URL:jdbc:mysql://localhost:3306/edipsico?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true}
spring.datasource.username=${APP_DB_USERNAME:root}
spring.datasource.password=${APP_DATABASE_PASSWORD:facu}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}
server.servlet.context-path=/EDI
